name: Validate YAML

on:
  push:
    paths:
      - '**.yml'
      - '**.yaml'
  release:
    types: [created]

jobs:
  releases-matrix:
    name: Validate YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: RomanosTrechlis/actions-validate-yaml@master
        with:
          schema: spec.yaml
          data: |-
            check-openssl.yml